<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Altana</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#e2362e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Altana">
<style>
  html,body{ margin:0; padding:0; height:100%; background:#faf9f6; overflow:hidden; }
  #app-frame{ position:fixed; top:0; left:0; width:100%; height:100%; border:0; display:block; }

  #splash{
    position:fixed; inset:0; background:#faf9f6; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; transition:opacity .4s ease;
    font-family:system-ui,sans-serif;
  }
  #splash.hide{ opacity:0; pointer-events:none; }
  #splash svg{ width:72px; height:72px; border-radius:16px; }
  #splash p{ color:#74706a; font-size:13px; margin:0; }

  #fallback{
    position:fixed; left:0; right:0; bottom:0; background:#fbe6e4; color:#c32a23;
    font-family:system-ui,sans-serif; font-size:13px; padding:12px 16px; text-align:center; display:none;
  }
  #fallback a{ color:#c32a23; font-weight:600; text-decoration:underline; }
</style>
</head>
<body>

<script>
  // ====== CONFIGURAÇÃO: cole aqui a URL do app da web do Apps Script (SEM parâmetros) ======
  var BASE_APP_URL = "https://script.google.com/macros/s/AKfycbznLiKyWOtYln11ZBOIDp2MwXCGZM2Z3a0yL18SJNfV1yegDP6q7-9Bo6XvBObTgkHIBw/exec";

  // O token de sessão fica guardado AQUI, no localStorage do próprio
  // github.io — armazenamento de primeira parte, nunca bloqueado por
  // navegador nenhum. O app (que roda num iframe do Google) nos avisa por
  // postMessage sempre que o token mudar (login, logout, sessão expirada);
  // nós guardamos e devolvemos pra ele via parâmetro na própria URL do
  // iframe na próxima vez que a página abrir.
  function getToken(){ try{ return localStorage.getItem('assistente_token') || ''; }catch(e){ return ''; } }
  function setToken(t){ try{ if(t) localStorage.setItem('assistente_token', t); else localStorage.removeItem('assistente_token'); }catch(e){} }

  var savedToken = getToken();
  var frameSrc = BASE_APP_URL + (savedToken ? ('?token=' + encodeURIComponent(savedToken)) : '');
</script>

  <iframe id="app-frame" title="Altana"></iframe>

  <div id="splash">
    <svg viewBox="0 0 84 84" xmlns="http://www.w3.org/2000/svg">
      <rect width="84" height="84" rx="18" fill="#e2362e"/>
      <path d="M22,68 L42,30 L62,68" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="42" cy="19" r="4.5" fill="#ffffff"/>
    </svg>
    <p>Carregando Altana…</p>
  </div>

  <div id="fallback">
    Demorando demais? <a id="fallback-link" href="#" target="_blank">Abrir em uma aba nova</a>
  </div>

<script>
  var frame = document.getElementById('app-frame');
  var splash = document.getElementById('splash');
  var fallback = document.getElementById('fallback');

  document.getElementById('fallback-link').href = frameSrc;
  frame.src = frameSrc;

  frame.addEventListener('load', function(){ splash.classList.add('hide'); });

  setTimeout(function(){
    if(!splash.classList.contains('hide')) fallback.style.display = 'block';
  }, 6000);

  // Recebe o token do app (Apps Script) sempre que ele mudar e guarda aqui.
  // Aceita mensagens de qualquer subdomínio do Google (o Apps Script roda
  // dentro de um iframe interno do próprio Google, em endereços que mudam).
  window.addEventListener('message', function(ev){
    var origemValida = ev.origin === 'https://script.google.com' || /\.googleusercontent\.com$/.test(ev.origin);
    if(!origemValida) return;
    if(!ev.data || ev.data.type !== 'assistente-token') return;
    setToken(ev.data.token || '');
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
