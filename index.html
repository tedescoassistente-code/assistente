<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Assistente</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#e2362e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Assistente">
<style>
  html,body{ margin:0; padding:0; height:100%; background:#faf9f6; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    font-family:system-ui,sans-serif; }
  svg{ width:72px; height:72px; border-radius:16px; }
  p{ color:#74706a; font-size:13px; margin:0; }
  #fallback{
    position:fixed; left:0; right:0; bottom:0; background:#fbe6e4; color:#c32a23;
    font-size:13px; padding:12px 16px; text-align:center; display:none;
  }
  #fallback a{ color:#c32a23; font-weight:600; text-decoration:underline; }
</style>
</head>
<body>

  <!-- ====== CONFIGURAÇÃO: cole aqui a URL do app da web do Apps Script ====== -->
  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbznLiKyWOtYln11ZBOIDp2MwXCGZM2Z3a0yL18SJNfV1yegDP6q7-9Bo6XvBObTgkHIBw/exec";
  </script>

  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" rx="44" fill="#e2362e"/>
    <path d="M70,150 L100,55 L130,150" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="82" y1="118" x2="118" y2="118" stroke="#fff" stroke-width="18" stroke-linecap="round"/>
    <circle cx="100" cy="36" r="9" fill="#fff"/>
  </svg>
  <p>Abrindo Assistente…</p>

  <div id="fallback">
    Demorando demais? <a id="fallback-link" href="#" target="_top">Abrir agora</a>
  </div>

<script>
  // IMPORTANTE: redireciona a página INTEIRA (sem iframe). Isso é o que faz a
  // sessão (localStorage) sobreviver entre visitas — navegadores modernos
  // (Safari, Firefox, Chrome) restringem armazenamento de páginas carregadas
  // dentro de um iframe de outro domínio, o que fazia o app "esquecer" o
  // login e pedir um novo código de acesso a cada entrada.
  document.getElementById('fallback-link').href = APP_URL;

  // pequeno atraso só pra mostrar o splash com a marca antes de sair daqui
  setTimeout(function () {
    window.location.replace(APP_URL);
  }, 300);

  // se por algum motivo o redirecionamento não disparar (bloqueador, etc.),
  // mostra o link manual depois de alguns segundos
  setTimeout(function () {
    document.getElementById('fallback').style.display = 'block';
  }, 4000);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
